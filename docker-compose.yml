services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./specs:/app/specs:ro
      - ./prompts:/app/prompts:ro
      - ./runs:/app/runs
    env_file:
      - .env
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      - ngrok
    networks:
      - pipeline-net

  ngrok:
    image: ngrok/ngrok:latest
    restart: on-failure
    command:
      - http
      - "--url=${NGROK_DOMAIN}"
      - "pipeline:${WEBHOOK_PORT}"
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTH_TOKEN}"
    ports:
      - "4040:4040"
    networks:
      - pipeline-net

networks:
  pipeline-net:
    driver: bridge